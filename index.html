<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wealthfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
margin:0;
background:#0b0f1a;
color:#fff;
}

header{
padding:15px;
background:#11182a;
display:flex;
justify-content:space-between;
align-items:center;
}

.tab{
padding:10px;
cursor:pointer;
display:inline-block;
}

.tab.active{
background:#1f2a48;
border-radius:8px;
}

.container{padding:15px;}

.card{
background:#151d33;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,button,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
background:#2d6cdf;
color:white;
}

button.danger{background:red;}

.row{display:flex;gap:10px;flex-wrap:wrap;}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1b2440;
padding:20px;
border-radius:10px;
width:300px;
position:relative;
}

.close{
position:absolute;
top:5px;
right:10px;
cursor:pointer;
}

.warning{color:orange;}
.dangerText{color:red;}
.good{color:lightgreen;}
</style>
</head>

<body>

<header>
<h3>💰 Wealthfolio</h3>
<div id="tabs">
<span class="tab active" onclick="switchTab('dashboard')">Dashboard</span>
<span class="tab" onclick="switchTab('income')">Income</span>
<span class="tab" onclick="switchTab('expenses')">Expenses</span>
<span class="tab" onclick="switchTab('loans')">Loans</span>
<span class="tab" onclick="switchTab('cards')">Credit Cards</span>
<span class="tab" onclick="switchTab('invest')">Invest</span>
<span class="tab" onclick="switchTab('targets')">Targets</span>
</div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Enter Passcode</h3>
<input type="password" id="passcode">
<button onclick="login()">Unlock</button>
<button onclick="forgot()">Forgot</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card" style="display:none;">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</div>

<!-- INCOME -->
<div id="income" class="card" style="display:none;">
<h3>Monthly Income</h3>
<input id="incomeName" placeholder="Source">
<input id="incomeAmt" placeholder="Amount">
<button onclick="addIncome()">Add</button>
<div id="incomeList"></div>
</div>

<!-- EXPENSE -->
<div id="expenses" class="card" style="display:none;">
<h3>Expenses</h3>
<input id="expName" placeholder="Expense">
<input id="expAmt" placeholder="Amount">
<button onclick="addExpense()">Add</button>
<div id="expList"></div>
</div>

<!-- LOANS -->
<div id="loans" class="card" style="display:none;">
<h3>Loans</h3>
<input id="loanBank" placeholder="Bank">
<input id="loanAmt" placeholder="Amount">
<input id="loanRate" placeholder="Annual %">
<input id="loanMonths" placeholder="Months">
<button onclick="addLoan()">Add Loan</button>
<div id="loanList"></div>
</div>

<!-- CARDS -->
<div id="cards" class="card" style="display:none;">
<h3>Credit Cards</h3>
<input id="cardBank" placeholder="Bank">
<input id="cardAmt" placeholder="Amount">
<input id="cardDays" value="50" placeholder="Days">
<button onclick="addCard()">Add Card Expense</button>
<div id="cardList"></div>
</div>

<!-- INVEST -->
<div id="invest" class="card" style="display:none;">
<h3>Investments</h3>
<input id="invName" placeholder="Company/Person">
<input id="invAmt" placeholder="Amount">
<input id="invDiv" placeholder="Dividend %">
<input id="invDate" type="date">
<button onclick="addInvest()">Add</button>
<div id="invList"></div>
</div>

<!-- TARGETS -->
<div id="targets" class="card" style="display:none;">
<h3>Targets</h3>
<input id="targetName" placeholder="Target">
<input id="targetAmt" placeholder="Amount">
<input id="targetDate" type="date">
<button onclick="addTarget()">Add Target</button>
<div id="targetList"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">❌</span>
<h3 id="modalText"></h3>
<button onclick="confirmAction()">Complete</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("wealthfolio") || "{}");

if(!data.passcode){
data.passcode = "1234";
data.income=[];data.expenses=[];
data.loans=[];data.cards=[];
data.invest=[];data.targets=[];
save();
}

function save(){
localStorage.setItem("wealthfolio", JSON.stringify(data));
renderAll();
}

function login(){
let p=document.getElementById("passcode").value;
if(p===data.passcode){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
drawChart();
}else alert("Wrong passcode");
}

function forgot(){
let newp=prompt("Set new passcode");
if(newp){data.passcode=newp;save();}
}

function switchTab(id){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(id).style.display="block";
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
renderAll();
}

function addIncome(){
data.income.push({n:incomeName.value,a:+incomeAmt.value});
save();
}

function addExpense(){
data.expenses.push({n:expName.value,a:+expAmt.value});
save();
}

function addLoan(){
data.loans.push({
b:loanBank.value,a:+loanAmt.value,r:+loanRate.value,m:+loanMonths.value,t:Date.now()
});
save();
}

function addCard(){
data.cards.push({
b:cardBank.value,a:+cardAmt.value,d:+cardDays.value,t:Date.now()
});
save();
}

function addInvest(){
data.invest.push({
n:invName.value,a:+invAmt.value,d:+invDiv.value,date:invDate.value
});
save();
}

function addTarget(){
data.targets.push({
n:targetName.value,a:+targetAmt.value,d:targetDate.value,done:0
});
save();
}

function renderAll(){
incomeList.innerHTML=data.income.map(i=>i.n+" "+i.a).join("<br>");
expList.innerHTML=data.expenses.map(i=>i.n+" "+i.a).join("<br>");
loanList.innerHTML=data.loans.map(l=>l.b+" "+l.a).join("<br>");
cardList.innerHTML=data.cards.map(c=>{
let daysLeft=c.d-((Date.now()-c.t)/86400000);
let color=daysLeft<10?"dangerText":(daysLeft<20?"warning":"good");
return `<div class="${color}">${c.b} - ${daysLeft.toFixed(0)} days</div>`;
}).join("");
invList.innerHTML=data.invest.map(i=>i.n+" "+i.a).join("<br>");
targetList.innerHTML=data.targets.map(t=>t.n+" "+t.a).join("<br>");
drawChart();
}

function drawChart(){
let ctx=document.getElementById("chart");
if(!ctx) return;
new Chart(ctx,{
type:"bar",
data:{
labels:["Income","Expenses"],
datasets:[{
data:[
data.income.reduce((a,b)=>a+b.a,0),
data.expenses.reduce((a,b)=>a+b.a,0)
]
}]
}
});
}

setInterval(()=>renderAll(),5000);
</script>

</body>
</html>
